<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Bridge - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <div class="logo-section">
          <h1 class="login-title">🍽️ Food Bridge</h1>
          <p class="login-subtitle">Welcome to Food Bridge</p>
        </div>
        <div class="role-selector">
          <button class="role-button donor-role active" onclick="setRole('donor')" title="I want to donate food">
            <i class="fas fa-gift"></i> Donor
          </button>
          <button class="role-button ngo-role" onclick="setRole('ngo')" title="I'm an NGO partner">
            <i class="fas fa-handshake"></i> NGO
          </button>
        </div>
        <div class="role-indicator">
          <span id="current-role">Loading...</span>
        </div>
      </div>

      <div class="login-form-section">
        <div class="form-tabs">
          <button id="login-tab" class="form-tab active">Login</button>
          <button id="signup-tab" class="form-tab">Sign Up</button>
        </div>

        <form id="auth-form" class="auth-form">
          <div id="name-group" class="form-group hidden">
            <label for="auth-name">Full Name</label>
            <input id="auth-name" type="text" placeholder="Your full name" />
          </div>

          <div class="form-group">
            <label for="auth-email">Email Address</label>
            <input id="auth-email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="auth-password">Password</label>
            <input id="auth-password" type="password" placeholder="Enter your password" required />
          </div>

          <div id="message-box" class="message hidden"></div>

          <button type="submit" class="primary-button" id="auth-submit">Continue</button>
        </form>

        <div class="form-footer">
          <button class="back-button" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back to Home
          </button>
        </div>
      </div>

      <div class="login-features">
        <div class="feature-highlight">
          <i class="fas fa-shield-alt"></i>
          <span>Secure & Verified Platform</span>
        </div>
        <div class="feature-highlight">
          <i class="fas fa-users"></i>
          <span>Connect with Trusted Partners</span>
        </div>
        <div class="feature-highlight">
          <i class="fas fa-heart"></i>
          <span>Make a Difference Today</span>
        </div>
      </div>
    </div>

    <div class="login-bg-pattern">
      <div class="floating-elements">
        <div class="floating-food">🍕</div>
        <div class="floating-food">🍎</div>
        <div class="floating-food">🥗</div>
        <div class="floating-food">🍞</div>
        <div class="floating-food">🥕</div>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
